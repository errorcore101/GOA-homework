<!DOCTYPE html>
<html>
<head>
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h2>Tip Calculator</h2>

  <label>Bill</label>
  <input type="number" id="bill" placeholder="0">

  <label>Tip %</label>
  <div class="buttons">
    <button onclick="setTip(5)">5%</button>
    <button onclick="setTip(10)">10%</button>
    <button onclick="setTip(15)">15%</button>
    <button onclick="setTip(25)">25%</button>
    <button onclick="setTip(50)">50%</button>
  </div>

  <label>People</label>
  <input type="number" id="people" placeholder="1">

  <div class="result">
    <p>Tip per person: $<span id="tip">0</span></p>
    <p>Total per person: $<span id="total">0</span></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
