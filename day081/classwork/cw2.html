<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fun Fact Slider</title>
  <link rel="stylesheet" href="styles.css">
</head>
    <body>
    
    <div class="slider">
    
      <div class="card">
        <div class="counter" id="counter">1 / 5</div>
    
        <div class="emoji" id="emoji">🦁</div>
        <h2 id="title">Lion</h2>
        <p id="fact">
          Lions can sleep up to 20 hours a day. That’s a serious nap schedule!
        </p>
      </div>
  
      <div class="buttons">
        <button onclick="prevSlide()">← Previous</button>
        <button onclick="nextSlide()">Next →</button>
      </div>
  
    </div>
    
    <script src="script.js"></script>
    </body>
</html>
