<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>JS Tasks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <button id="colorBtn">შეცვალე ფერი</button>

    <p id="statusText">ჩართულია</p>
    <button id="toggleBtn">ჩართვა/გამორთვა</button>

    <h2 id="counter">0</h2>
    <button id="plusBtn">+</button>
    <button id="minusBtn">-</button>

    <div id="square"></div>
    <button id="toggleSquareBtn">კვადრატის ჩვენება/დამალვა</button>

    <ul id="list"></ul>
    <button id="addItemBtn">დაამატე წევრი</button>

    <script src="script.js"></script>
</body>
</html>
