<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="myDiv"></div>

    <script src="script.js"></script>
    <!--
    mousedown – იძახება მაშინ, როცა მაუსის ღილაკს დააჭერ ელემენტზე.
    mouseenter – იძახება მაშინ, როცა მაუსი პირველად შევა ელემენტის შიგნით (არ მოქმედებს შვილ ელემენტებზე გადასვლისას).
    mouseleave – იძახება მაშინ, როცა მაუსი დატოვებს ელემენტს.
    mousemove – იძახება ყოველ ჯერზე, როცა მაუსი მოძრაობს ელემენტის შიგნით.
    mouseover – იძახება მაშინ, როცა მაუსი შევა ელემენტზე (მათ შორის მის შვილ ელემენტებზეც გადასვლისას)
    -->
</body>
</html>
