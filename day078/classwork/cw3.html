<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Events Example</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <h1 id="title">მივმართოთ Events-ს</h1>

    <!-- 
        CLICK EVENT:
        როცა მომხმარებელი დააჭერს ამ ღილაკს,
        JavaScript გამოიძახებს ფუნქციას და გამოჩნდება alert
    -->
    <button id="btn">დამაჭირე</button>

    <!-- 
        MOUSEOVER EVENT:
        როცა მაუსი გადავა ამ ტექსტზე,
        მისი ფერი შეიცვლება (გახდება წითელი)
    -->
    <p id="text">მოიტანე მაუსი აქ</p>

    <script src="script3.js"></script>
</body>
</html>
